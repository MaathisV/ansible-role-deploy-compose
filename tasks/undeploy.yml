- name: Preview undeploy candidates (debug)
  debug:
    msg: "Host {{ inventory_hostname }} will undeploy: {{ to_undeploy | default([]) }}"

- name: Ensure containers for {{ service.name }} are down
  community.docker.docker_compose_v2:
    project_src: "{{ services_base_path }}/{{ service.name }}"
    state: absent
    remove_orphans: true

- name: Remove backup cron for {{ service.name }}
  become: true
  ansible.builtin.cron:
    name: "borg backup {{ service.name }}"
    user: root
    state: absent
